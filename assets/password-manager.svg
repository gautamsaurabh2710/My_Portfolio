<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Password manager API illustration</title>
  <desc id="desc">A secure backend dashboard with API routes, database nodes, a lock, and OTP authentication code.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06110e"/>
      <stop offset="0.58" stop-color="#0f2a22"/>
      <stop offset="1" stop-color="#153a2f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#b8ff5c"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="520" rx="34" fill="url(#bg)"/>
  <path d="M0 96H900M0 192H900M0 288H900M0 384H900M120 0V520M260 0V520M400 0V520M540 0V520M680 0V520M820 0V520" stroke="#b8ff5c" stroke-opacity=".08" stroke-width="2"/>

  <rect x="58" y="58" width="784" height="404" rx="24" fill="#07120f" stroke="#dfffee" stroke-width="4"/>
  <rect x="88" y="94" width="280" height="330" rx="18" fill="#0d1f1a" stroke="#34d399" stroke-opacity=".7" stroke-width="3"/>
  <rect x="410" y="94" width="402" height="330" rx="18" fill="#0d1f1a" stroke="#5eead4" stroke-opacity=".55" stroke-width="3"/>

  <circle cx="122" cy="126" r="9" fill="#ff7a59"/>
  <circle cx="152" cy="126" r="9" fill="#b8ff5c"/>
  <circle cx="182" cy="126" r="9" fill="#34d399"/>

  <text x="116" y="184" fill="#b8ff5c" font-family="Consolas, monospace" font-size="30" font-weight="700">POST /register</text>
  <text x="116" y="235" fill="#5eead4" font-family="Consolas, monospace" font-size="30" font-weight="700">POST /login</text>
  <text x="116" y="286" fill="#ff7a59" font-family="Consolas, monospace" font-size="30" font-weight="700">POST /otp</text>
  <text x="116" y="337" fill="#e9fff6" font-family="Consolas, monospace" font-size="30" font-weight="700">GET /vault</text>

  <path d="M530 252v-56c0-58 42-100 100-100s100 42 100 100v56" fill="none" stroke="url(#accent)" stroke-width="28" stroke-linecap="round" filter="url(#glow)"/>
  <rect x="498" y="230" width="264" height="160" rx="26" fill="#07120f" stroke="#e9fff6" stroke-width="5"/>
  <circle cx="630" cy="300" r="25" fill="#b8ff5c"/>
  <rect x="617" y="320" width="26" height="42" rx="12" fill="#b8ff5c"/>

  <g stroke="#34d399" stroke-width="4" stroke-linecap="round" opacity=".78">
    <path d="M368 210H440"/>
    <path d="M368 278H440"/>
    <path d="M368 346H440"/>
  </g>
  <g fill="#07120f" stroke="#5eead4" stroke-width="4">
    <circle cx="454" cy="210" r="18"/>
    <circle cx="454" cy="278" r="18"/>
    <circle cx="454" cy="346" r="18"/>
  </g>

  <rect x="566" y="408" width="128" height="44" rx="12" fill="#34d399"/>
  <text x="592" y="439" fill="#07120f" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">OTP</text>
</svg>
